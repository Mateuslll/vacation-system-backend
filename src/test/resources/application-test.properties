spring.application.name=taskflow-backend-test

application.environment=test

server.port=0
server.servlet.encoding.charset=UTF-8
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.security.user.name=disabled
spring.security.user.password=disabled

vacation.overlap.cache.ttl=1
user.session.cache.ttl=1

springdoc.swagger-ui.enabled=false

logging.level.root=WARN
logging.level.com.taskflow=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.testcontainers=INFO

management.endpoints.web.exposure.include=health

spring.test.database.replace=none
spring.jpa.defer-datasource-initialization=true

spring.jackson.time-zone=Europe/Lisbon

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test

sentry.dsn=